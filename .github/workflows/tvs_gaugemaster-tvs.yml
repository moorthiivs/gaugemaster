name: Deploy NestJS app to Azure Web App - Gaugemaster

on:
  push:
    branches:
      - tvs
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      # Step 1: Checkout the repository
      - uses: actions/checkout@v4

      # Step 2: Set up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'

      # Step 3: Install and Build Frontend
      - name: Build Frontend
        run: |
          cd frontend
          npm install --legacy-peer-deps
          npm run build

      # Step 4: Copy Frontend build to Backend public folder
      - name: Copy Frontend to Backend
        run: |
          mkdir -p backend/src/public
          cp -R frontend/dist/* backend/src/public/

      # Step 5: Install Backend Dependencies and Build
      - name: Build Backend
        run: |
          cd backend
          npm install
          npm run build
          npm prune --production

      # Step 6: Upload for deployment
      - name: Upload artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: backend/

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      # Step 5: Download artifact
      - name: Download artifact from build
        uses: actions/download-artifact@v4
        with:
          name: node-app

      # Step 6: Deploy to Azure Web App
      - name: Deploy to Azure
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'gaugemaster-tvs'
          slot-name: 'Production'
          package: .
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_TVS }}
